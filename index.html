<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CC Switch · 管理面板</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --bg-soft: #161b22;
    --bg-elev: #1c2330;
    --border: #2a3340;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #d97757;       /* Claude 暖橙 */
    --accent-soft: #d9775722;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --radius: 12px;
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 24px 20px 60px; }

  header { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .logo {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #b85c3e);
    display: grid; place-items: center; font-weight: 700; font-size: 18px; color: #fff;
  }
  header h1 { font-size: 20px; font-weight: 650; letter-spacing: .2px; }
  header .sub { color: var(--text-dim); font-size: 13px; }
  .topbar { display: flex; align-items: center; gap: 10px; margin-left: auto; }

  .grid { display: grid; grid-template-columns: 1.15fr .85fr; gap: 18px; margin-top: 22px; }
  @media (max-width: 920px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .card h2 {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .card h2 .dim { color: var(--text-dim); font-weight: 400; font-size: 12px; margin-left: auto; }

  /* 供应商列表 */
  .providers { display: flex; flex-direction: column; gap: 10px; }
  .provider {
    border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
    cursor: pointer; transition: .15s; background: var(--bg-elev);
  }
  .provider:hover { border-color: #3d4a5c; }
  .provider.active { border-color: var(--accent); background: var(--accent-soft); }
  .provider .row { display: flex; align-items: center; gap: 10px; }
  .provider .name { font-weight: 600; font-size: 14px; }
  .provider .url { color: var(--text-dim); font-size: 12px; font-family: var(--mono);
                   margin-top: 4px; word-break: break-all; }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: #2a3340; color: var(--text-dim);
  }
  .badge.on { background: #1f3d27; color: var(--green); }
  .badge.current { background: var(--accent); color: #fff; margin-left: auto; }
  .badge.warn { background: #3d3320; color: var(--yellow); }

  /* 账号 */
  .accounts { margin-top: 10px; display: none; flex-direction: column; gap: 6px; }
  .provider.expanded .accounts { display: flex; }
  .account {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px;
    background: var(--bg-soft); border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px;
  }
  .account .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex: none; }
  .account.active .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .account .key { font-family: var(--mono); color: var(--text-dim); font-size: 12px; }
  .account .acts { margin-left: auto; display: flex; gap: 6px; }

  button {
    font-family: inherit; font-size: 13px; border: 1px solid var(--border);
    background: var(--bg-elev); color: var(--text); padding: 7px 13px;
    border-radius: 8px; cursor: pointer; transition: .15s;
  }
  button:hover { border-color: #4d5b6e; background: #232c3a; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: #c5664a; }
  button.ghost { background: transparent; }
  button.danger { color: var(--red); border-color: transparent; background: transparent; }
  button.danger:hover { background: #f8514922; }
  button.sm { padding: 4px 9px; font-size: 12px; }
  button:disabled { opacity: .45; cursor: not-allowed; }

  .icon-btn { padding: 6px 9px; }

  /* 进程控制 + 状态 */
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat { background: var(--bg-elev); border: 1px solid var(--border);
          border-radius: 10px; padding: 11px 13px; }
  .stat .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
  .stat .val { font-size: 16px; font-weight: 600; margin-top: 3px; }
  .stat .val.run { color: var(--green); }
  .stat .val.stop { color: var(--text-dim); }

  .ctrl-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .ka-toggle { display: flex; align-items: center; gap: 5px; margin-left: auto;
               font-size: 13px; color: var(--text-dim); cursor: pointer; user-select: none; }
  .ka-toggle input { width: auto; }
  .ka-info { font-size: 12px; color: var(--text-dim); min-height: 16px; margin-bottom: 8px; }
  .ka-info .hot { color: var(--green); }

  /* 终端 (xterm) */
  .term {
    background: #000; border: 1px solid var(--border); border-radius: 10px;
    height: 440px; padding: 8px 6px 4px 10px; overflow: hidden;
  }
  .term.fs {
    position: fixed; inset: 0; z-index: 200; height: 100vh; width: 100vw;
    border-radius: 0; padding: 14px 10px;
  }
  .term .xterm { height: 100%; }
  .term-hint { font-size: 12px; color: var(--text-dim); margin-top: 8px; }
  #fs-exit {
    display: none; position: fixed; top: 14px; right: 16px; z-index: 201;
    background: var(--bg-elev); border-color: var(--accent);
  }

  /* 启动配置 */
  .launch-cfg { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .cfg-row { display: flex; gap: 8px; align-items: center; }
  .cfg-row label { font-size: 12px; color: var(--text-dim); width: 64px; flex: none; }
  .seg { display: flex; gap: 6px; }
  .seg button { flex: 1; }
  .seg button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .cwd-box { flex: 1; display: flex; gap: 6px; }
  .cwd-box input { flex: 1; font-family: var(--mono); font-size: 12px; }

  /* 目录选择器 */
  .picker { max-height: 240px; overflow-y: auto; border: 1px solid var(--border);
            border-radius: 8px; margin: 10px 0; }
  .picker .pi {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .picker .pi:last-child { border-bottom: none; }
  .picker .pi:hover { background: var(--bg-elev); }
  .picker .pi .ico { color: var(--accent); }
  .picker-path { font-family: var(--mono); font-size: 12px; color: var(--text-dim);
                 word-break: break-all; margin-bottom: 4px; }

  input, select {
    font-family: inherit; font-size: 13px; background: var(--bg-elev);
    border: 1px solid var(--border); color: var(--text);
    padding: 9px 11px; border-radius: 8px; width: 100%;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg-elev); border: 1px solid var(--border); color: var(--text);
    padding: 11px 18px; border-radius: 10px; font-size: 13px; opacity: 0;
    transition: .25s; pointer-events: none; z-index: 100; box-shadow: 0 8px 30px #000a;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.ok { border-color: var(--green); }
  #toast.err { border-color: var(--red); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: #000a; display: none;
    place-items: center; z-index: 90; backdrop-filter: blur(2px);
  }
  .modal-bg.show { display: grid; }
  .modal {
    background: var(--bg-soft); border: 1px solid var(--border); border-radius: 14px;
    padding: 22px; width: 92%; max-width: 420px;
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .modal-acts { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .dot-live { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); display: inline-block; }
  .dot-live.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">CC</div>
    <div>
      <h1>CC Switch <span class="sub">· Claude Code 管理面板</span></h1>
      <div class="sub" id="env-line">加载中…</div>
    </div>
    <div class="topbar">
      <span class="dot-live" id="sse-dot" title="实时连接"></span>
      <button class="ghost sm" onclick="refresh()">↻ 刷新</button>
    </div>
  </header>

  <div class="grid">
    <!-- 左：供应商 / 账号 -->
    <div class="card">
      <h2>供应商 &amp; 账号 <span class="dim" id="current-label"></span></h2>
      <div class="providers" id="providers"></div>
    </div>

    <!-- 右：进程 + 状态 + 终端 -->
    <div>
      <div class="card" style="margin-bottom:18px;">
        <h2>使用状态</h2>
        <div class="status-grid">
          <div class="stat">
            <div class="label">进程</div>
            <div class="val stop" id="st-run">未运行</div>
          </div>
          <div class="stat">
            <div class="label">PID</div>
            <div class="val" id="st-pid">—</div>
          </div>
          <div class="stat">
            <div class="label">当前供应商</div>
            <div class="val" id="st-provider" style="font-size:14px;">—</div>
          </div>
          <div class="stat">
            <div class="label">运行时长</div>
            <div class="val" id="st-uptime" style="font-size:14px;">—</div>
          </div>
        </div>
        <div class="launch-cfg">
          <div class="cfg-row">
            <label>工作目录</label>
            <div class="cwd-box">
              <input id="cwd" placeholder="留空 = 启动 app.py 的目录" />
              <button class="sm" onclick="openPicker()">浏览…</button>
            </div>
          </div>
          <div class="cfg-row">
            <label>会话</label>
            <div class="seg" id="session-seg">
              <button class="sm on" data-mode="new" onclick="setMode(this)">新会话</button>
              <button class="sm" data-mode="continue" onclick="setMode(this)">继续上次</button>
              <button class="sm" data-mode="resume" onclick="setMode(this)">恢复历史…</button>
            </div>
          </div>
        </div>
        <div class="ctrl-row">
          <button class="primary" id="btn-start" onclick="claudeAction('start')">▶ 启动</button>
          <button id="btn-restart" onclick="claudeAction('restart')">⟳ 重启</button>
          <button id="btn-stop" onclick="claudeAction('stop')">■ 停止</button>
          <label class="ka-toggle" title="进程意外退出时自动重启">
            <input type="checkbox" id="ka" onchange="toggleKeepalive()" />
            <span>保活</span>
          </label>
        </div>
        <div class="ka-info" id="ka-info"></div>
      </div>

      <div class="card">
        <h2>进程终端
          <span style="color:var(--text-dim);font-weight:400;font-size:12px;">实时 · 可直接交互</span>
          <button class="sm ghost" id="fs-btn" style="margin-left:auto;font-size:12px;"
                  onclick="toggleFullscreen()">⛶ 全屏</button>
        </h2>
        <div class="term" id="term"></div>
        <div class="term-hint">提示：点一下终端即可直接打字、用方向键 / 回车操作 claude（和真终端一样）。</div>
      </div>
    </div>
  </div>
</div>

<!-- 账号弹窗 -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">添加账号</h3>
    <div class="field">
      <label>账号名称</label>
      <input id="m-name" placeholder="例如：个人 / 团队 / 备用" />
    </div>
    <div class="field">
      <label>API Key <span id="m-key-hint" style="color:var(--text-dim)"></span></label>
      <input id="m-key" placeholder="sk-..." />
    </div>
    <div class="modal-acts">
      <button class="ghost" onclick="closeModal()">取消</button>
      <button class="primary" onclick="saveAccount()">保存</button>
    </div>
  </div>
</div>

<!-- 供应商端点编辑弹窗 -->
<div class="modal-bg" id="provider-modal">
  <div class="modal">
    <h3 id="pm-title">编辑端点</h3>
    <div class="field">
      <label>显示名称</label>
      <input id="pm-label" />
    </div>
    <div class="field">
      <label>Base URL（Anthropic 兼容端点）</label>
      <input id="pm-url" placeholder="https://api.example.com/anthropic" />
    </div>
    <div class="field">
      <label>模型 ID（可选，注入 ANTHROPIC_MODEL）</label>
      <input id="pm-model" placeholder="例如 deepseek-chat" />
    </div>
    <div class="field">
      <label>鉴权环境变量</label>
      <select id="pm-auth">
        <option value="ANTHROPIC_AUTH_TOKEN">ANTHROPIC_AUTH_TOKEN（多数第三方）</option>
        <option value="ANTHROPIC_API_KEY">ANTHROPIC_API_KEY（Claude 官方）</option>
      </select>
    </div>
    <div class="modal-acts">
      <button class="ghost" onclick="closeProviderEdit()">取消</button>
      <button class="primary" onclick="saveProvider()">保存</button>
    </div>
  </div>
</div>

<!-- 目录选择弹窗 -->
<div class="modal-bg" id="picker-modal">
  <div class="modal" style="max-width:520px;">
    <h3>选择工作目录</h3>
    <div class="picker-path" id="picker-path">~</div>
    <div class="picker" id="picker-list"></div>
    <div class="modal-acts">
      <button class="ghost" onclick="closePicker()">取消</button>
      <button class="primary" onclick="choosePickerPath()">选择当前目录</button>
    </div>
  </div>
</div>

<button id="fs-exit" onclick="toggleFullscreen()">⛶ 退出全屏 (Esc)</button>

<div id="toast"></div>

<script>
const API = "";  // 同源
let STATE = null;
let editing = null;   // {provider, id} 编辑态，null 表示新增
let modalProvider = null;

// ---------- 工具 ----------
async function api(path, opts) {
  const res = await fetch(API + path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  let data = {};
  try { data = await res.json(); } catch (e) {}
  if (!res.ok || data.ok === false) {
    throw new Error(data.error || data.message || ("请求失败 " + res.status));
  }
  return data;
}

function toast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show " + type;
  clearTimeout(t._t);
  t._t = setTimeout(() => (t.className = ""), 2600);
}

function fmtUptime(s) {
  s = Math.floor(s);
  if (s < 60) return s + "s";
  const m = Math.floor(s / 60), sec = s % 60;
  if (m < 60) return `${m}m ${sec}s`;
  const h = Math.floor(m / 60);
  return `${h}h ${m % 60}m`;
}

// ---------- 渲染 ----------
function render() {
  if (!STATE) return;
  const cur = STATE.current_provider;
  const env = [];
  env.push(STATE.claude_available ? "claude ✓" : "claude ✗(未安装)");
  env.push(STATE.ccm_available ? "ccm ✓" : "ccm ✗(直写配置)");
  document.getElementById("env-line").textContent = env.join("  ·  ");

  const curLabel = STATE.providers[cur]?.label || cur;
  document.getElementById("current-label").textContent = "当前：" + curLabel;

  const box = document.getElementById("providers");
  box.innerHTML = "";
  Object.values(STATE.providers).forEach((p) => {
    const isCur = p.id === cur;
    const el = document.createElement("div");
    el.className = "provider" + (isCur ? " active expanded" : "");
    const accCount = p.accounts.length;

    let accHtml = "";
    p.accounts.forEach((a) => {
      const isAct = a.id === p.active_account;
      accHtml += `
        <div class="account ${isAct ? "active" : ""}">
          <span class="dot"></span>
          <span>${escapeHtml(a.name)}</span>
          <span class="key">${a.has_key ? a.key_masked : "（无 Key）"}</span>
          <span class="acts">
            ${isAct ? '<span class="badge on">使用中</span>'
                    : `<button class="sm ghost" onclick="activate('${p.id}','${a.id}')">设为当前</button>`}
            <button class="sm ghost" onclick="openEdit('${p.id}','${a.id}')">编辑</button>
            <button class="sm danger" onclick="delAccount('${p.id}','${a.id}')">删</button>
          </span>
        </div>`;
    });
    if (accCount === 0) {
      accHtml = `<div class="account" style="color:var(--text-dim);justify-content:center;">暂无账号，点击下方添加</div>`;
    }

    const urlText = p.base_url
      ? escapeHtml(p.base_url) + (p.model ? "  ·  " + escapeHtml(p.model) : "")
      : '<span style="color:var(--yellow)">未设置端点，点 ⚙ 配置</span>';
    el.innerHTML = `
      <div class="row" onclick="toggleProvider(this)">
        <span class="name">${escapeHtml(p.label)}</span>
        <span class="badge ${accCount ? "" : "warn"}">${accCount} 账号</span>
        <button class="sm ghost icon-btn" style="margin-left:auto" title="编辑端点 URL / 模型"
                onclick="event.stopPropagation();openProviderEdit('${p.id}')">⚙</button>
        ${isCur ? '<span class="badge current">当前</span>'
                : `<button class="sm" onclick="event.stopPropagation();switchProvider('${p.id}')">切换</button>`}
      </div>
      <div class="url">${urlText}</div>
      <div class="accounts">
        ${accHtml}
        <button class="sm ghost" style="align-self:flex-start;margin-top:4px;"
                onclick="openAdd('${p.id}')">+ 添加账号</button>
      </div>`;
    box.appendChild(el);
  });

  renderStatus(STATE.claude_status);
}

function renderStatus(s) {
  if (!s) return;
  const run = document.getElementById("st-run");
  run.textContent = s.running ? "运行中" : "未运行";
  run.className = "val " + (s.running ? "run" : "stop");
  document.getElementById("st-pid").textContent = s.pid || "—";
  document.getElementById("st-provider").textContent = s.provider || (STATE?.providers[STATE.current_provider]?.label) || "—";
  document.getElementById("st-uptime").textContent = s.running ? fmtUptime(s.uptime) : "—";
  document.getElementById("btn-start").disabled = s.running;
  document.getElementById("btn-stop").disabled = !s.running;

  // 看门狗 / 保活状态
  const ka = document.getElementById("ka");
  if (ka && document.activeElement !== ka) ka.checked = !!s.keepalive;
  const info = document.getElementById("ka-info");
  if (info) {
    const bits = [];
    if (s.keepalive) bits.push('<span class="hot">● 保活已开启（崩溃自动重启）</span>');
    if (s.restart_count) bits.push(`已自动重启 ${s.restart_count} 次`);
    if (!s.running && s.last_exit_code != null) bits.push(`上次退出码 ${s.last_exit_code}`);
    info.innerHTML = bits.join(" · ");
  }
}

async function toggleKeepalive() {
  const enabled = document.getElementById("ka").checked;
  try {
    await api("/api/claude/keepalive", { method: "POST", body: JSON.stringify({ enabled }) });
    toast(enabled ? "已开启保活" : "已关闭保活", "ok");
    refresh();
  } catch (e) { toast(e.message, "err"); }
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function toggleProvider(rowEl) {
  rowEl.closest(".provider").classList.toggle("expanded");
}

// ---------- 动作 ----------
async function refresh() {
  try {
    STATE = await api("/api/state");
    render();
  } catch (e) { toast(e.message, "err"); }
}

async function switchProvider(pid) {
  try {
    const r = await api("/api/provider/switch", { method: "POST", body: JSON.stringify({ provider: pid }) });
    toast("已切换供应商" + (r.ccm_output ? "（ccm）" : ""), "ok");
    await refresh();
  } catch (e) { toast(e.message, "err"); }
}

async function activate(pid, aid) {
  try {
    await api("/api/account/activate", { method: "POST", body: JSON.stringify({ provider: pid, account_id: aid }) });
    toast("已设为当前账号", "ok");
    await refresh();
  } catch (e) { toast(e.message, "err"); }
}

async function delAccount(pid, aid) {
  if (!confirm("确认删除该账号？")) return;
  try {
    await api(`/api/account/${aid}?provider=${encodeURIComponent(pid)}`, { method: "DELETE" });
    toast("已删除", "ok");
    await refresh();
  } catch (e) { toast(e.message, "err"); }
}

// 弹窗
function openAdd(pid) {
  editing = null; modalProvider = pid;
  document.getElementById("modal-title").textContent = "添加账号";
  document.getElementById("m-name").value = "";
  document.getElementById("m-key").value = "";
  document.getElementById("m-key-hint").textContent = "";
  document.getElementById("modal").classList.add("show");
}
function openEdit(pid, aid) {
  const acc = STATE.providers[pid].accounts.find((a) => a.id === aid);
  editing = { provider: pid, id: aid }; modalProvider = pid;
  document.getElementById("modal-title").textContent = "编辑账号";
  document.getElementById("m-name").value = acc.name;
  document.getElementById("m-key").value = "";
  document.getElementById("m-key-hint").textContent = "（留空则保持不变）";
  document.getElementById("modal").classList.add("show");
}
function closeModal() { document.getElementById("modal").classList.remove("show"); }

async function saveAccount() {
  const name = document.getElementById("m-name").value.trim();
  const key = document.getElementById("m-key").value.trim();
  try {
    if (editing) {
      await api(`/api/account/${editing.id}`, {
        method: "PUT",
        body: JSON.stringify({ provider: modalProvider, name, api_key: key }),
      });
      toast("已更新", "ok");
    } else {
      if (!key) { toast("请输入 API Key", "err"); return; }
      await api("/api/account", {
        method: "POST",
        body: JSON.stringify({ provider: modalProvider, name, api_key: key }),
      });
      toast("已添加账号", "ok");
    }
    closeModal();
    await refresh();
  } catch (e) { toast(e.message, "err"); }
}

// ---------- 启动配置：会话模式 ----------
let sessionMode = "new";
function setMode(btn) {
  document.querySelectorAll("#session-seg button").forEach((b) => b.classList.remove("on"));
  btn.classList.add("on");
  sessionMode = btn.dataset.mode;
}
function sessionArgs() {
  if (sessionMode === "continue") return ["--continue"];
  if (sessionMode === "resume") return ["--resume"];  // claude 会在终端里弹出会话选择器
  return [];
}

// 供应商端点编辑
let editingProvider = null;
function openProviderEdit(pid) {
  const p = STATE.providers[pid];
  editingProvider = pid;
  document.getElementById("pm-title").textContent = "编辑端点 · " + p.label;
  document.getElementById("pm-label").value = p.label;
  document.getElementById("pm-url").value = p.base_url;
  document.getElementById("pm-model").value = p.model;
  document.getElementById("pm-auth").value = p.auth_var || "ANTHROPIC_AUTH_TOKEN";
  document.getElementById("provider-modal").classList.add("show");
}
function closeProviderEdit() { document.getElementById("provider-modal").classList.remove("show"); }
async function saveProvider() {
  try {
    await api(`/api/provider/${editingProvider}`, {
      method: "PUT",
      body: JSON.stringify({
        label: document.getElementById("pm-label").value,
        base_url: document.getElementById("pm-url").value,
        model: document.getElementById("pm-model").value,
        auth_var: document.getElementById("pm-auth").value,
      }),
    });
    toast("端点已保存", "ok");
    closeProviderEdit();
    await refresh();
  } catch (e) { toast(e.message, "err"); }
}

// 进程控制
async function claudeAction(action) {
  try {
    const body = { rows: term ? term.rows : 30, cols: term ? term.cols : 100 };
    if (action === "start") {
      body.cwd = document.getElementById("cwd").value.trim();
      body.args = sessionArgs();
    }
    const r = await api(`/api/claude/${action}`, { method: "POST", body: JSON.stringify(body) });
    if (action !== "stop" && term) { term.focus(); fitTerm(); }
    toast(r.message || "ok", "ok");
    if (r.status) renderStatus(r.status);
    setTimeout(refresh, 400);
  } catch (e) { toast(e.message, "err"); }
}

// ---------- xterm 终端 ----------
let term, fitAddon;
function initTerm() {
  if (typeof Terminal === "undefined") {
    document.getElementById("term").innerHTML =
      '<div style="color:var(--red);padding:14px;font-size:13px;">' +
      'xterm.js 未能加载（可能离线 / CDN 被拦截）。供应商与账号管理仍可正常使用；' +
      '终端功能需要能访问 cdn.jsdelivr.net。</div>';
    return;
  }
  term = new Terminal({
    convertEol: false,
    cursorBlink: true,
    fontFamily: '"SF Mono","JetBrains Mono",Menlo,Consolas,monospace',
    fontSize: 12.5,
    theme: { background: "#000000", foreground: "#c9d1d9", cursor: "#d97757" },
    scrollback: 5000,
  });
  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById("term"));
  fitTerm();

  // 用户在终端里的按键 → 原样发到后端 pty
  term.onData((data) => {
    api("/api/claude/input", { method: "POST", body: JSON.stringify({ raw: data }) }).catch(() => {});
  });

  // 窗口尺寸变化 → 通知后端 pty，避免 TUI 错位
  let rT;
  window.addEventListener("resize", () => { clearTimeout(rT); rT = setTimeout(fitTerm, 150); });
}

// 终端全屏切换
let isFs = false;
function toggleFullscreen() {
  if (!term) { toast("终端未就绪", "err"); return; }
  isFs = !isFs;
  document.getElementById("term").classList.toggle("fs", isFs);
  document.getElementById("fs-exit").style.display = isFs ? "block" : "none";
  document.getElementById("fs-btn").textContent = isFs ? "⛶ 退出" : "⛶ 全屏";
  setTimeout(() => { fitTerm(); term.focus(); }, 60);
}
window.addEventListener("keydown", (e) => { if (e.key === "Escape" && isFs) toggleFullscreen(); });

function fitTerm() {
  if (!fitAddon) return;
  try {
    fitAddon.fit();
    api("/api/claude/resize", {
      method: "POST",
      body: JSON.stringify({ rows: term.rows, cols: term.cols }),
    }).catch(() => {});
  } catch (e) {}
}

// ---------- SSE 实时输出 → xterm ----------
function connectSSE() {
  const dot = document.getElementById("sse-dot");
  const es = new EventSource(API + "/api/claude/stream");
  es.onopen = () => dot.classList.add("on");
  es.onmessage = (ev) => {
    try {
      const { data } = JSON.parse(ev.data);
      if (term) term.write(data);
    } catch (e) {}
  };
  es.onerror = () => dot.classList.remove("on");  // EventSource 自动重连
}

// ---------- 目录选择器 ----------
let pickerPath = null;
async function openPicker() {
  const start = document.getElementById("cwd").value.trim() || "~";
  await loadPicker(start);
  document.getElementById("picker-modal").classList.add("show");
}
function closePicker() { document.getElementById("picker-modal").classList.remove("show"); }

async function loadPicker(path) {
  try {
    const r = await api("/api/fs/list?path=" + encodeURIComponent(path));
    pickerPath = r.path;
    document.getElementById("picker-path").textContent = r.path;
    const list = document.getElementById("picker-list");
    list.innerHTML = "";
    if (r.parent) {
      list.appendChild(pickerItem("⬆", "..", () => loadPicker(r.parent)));
    }
    r.dirs.forEach((d) => {
      const full = (r.path.endsWith("/") ? r.path : r.path + "/") + d;
      list.appendChild(pickerItem("📁", d, () => loadPicker(full)));
    });
    if (r.dirs.length === 0 && !r.parent) {
      const empty = document.createElement("div");
      empty.className = "pi"; empty.style.color = "var(--text-dim)";
      empty.textContent = "（无子目录）";
      list.appendChild(empty);
    }
  } catch (e) { toast(e.message, "err"); }
}
function pickerItem(ico, name, onclick) {
  const el = document.createElement("div");
  el.className = "pi";
  el.innerHTML = `<span class="ico">${ico}</span><span>${escapeHtml(name)}</span>`;
  el.onclick = onclick;
  return el;
}
function choosePickerPath() {
  if (pickerPath) document.getElementById("cwd").value = pickerPath;
  closePicker();
}

// ---------- 启动 ----------
initTerm();
refresh();
connectSSE();
setInterval(async () => {
  try {
    const s = await api("/api/claude/status");
    renderStatus(s);
  } catch (e) {}
}, 3000);
</script>
